<div class="modal-header">
    <h2>Change Password</h2>
    <button type="button" class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
</div>

<form hx-post="{% url 'password_change' %}" hx-target="#modal-content" hx-on::after-request="if(event.detail.xhr.status===204){closeModal()}">
    {% csrf_token %}
    <div style="display: flex; flex-direction: column; gap: 1rem;">
        {% if form.non_field_errors %}
        <div class="non-field-errors" style="background: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; padding: 0.75rem; border-radius: 8px; font-size: 0.9rem;">
            {{ form.non_field_errors }}
        </div>
        {% endif %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div style="color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem;">
                {{ field.errors }}
            </div>
            {% endif %}
            {% if field.help_text %}
            <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.25rem;">
                {{ field.help_text|safe }}
            </div>
            {% endif %}
        </div>
        {% endfor %}
        
        <div style="margin-top: 1rem; display: flex; gap: 1rem;">
            <button type="submit" style="flex: 1;">Change Password</button>
            <button type="button" class="secondary" onclick="closeModal()" style="flex: 1;">Cancel</button>
        </div>
    </div>
</form>
