{% extends "base.html" %}

{% block title %}Confirm Deletion - mlameh ticket{% endblock %}

{% block content %}
<div class="content-container">
    <div class="panel" style="max-width: 480px; margin: 2rem auto; text-align: center; padding: 2rem;">
        <h2 style="color: var(--danger); margin-bottom: 1rem;">Confirm Deletion</h2>
        <p style="font-size: 1.1rem; margin-bottom: 0.5rem; font-weight: 600;">
            Are you sure you want to delete this {{ object|lower }}?
        </p>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">
            This action cannot be undone.
        </p>
        <form method="post" class="form-actions" style="display: flex; gap: 0.75rem; justify-content: center;">
            {% csrf_token %}
            <button type="submit" style="flex: 1; background: var(--danger); border-color: var(--danger);">Yes, Delete</button>
            <a href="{% url 'settings' %}" class="btn secondary" style="flex: 1; text-align: center;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
