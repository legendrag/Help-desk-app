{% if active_announcements %}
<div class="announcements-container" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem;">
    {% for announcement in active_announcements %}
    <div class="panel announcement-card" id="announcement-{{ announcement.id }}" data-announcement-id="{{ announcement.id }}">
        <div class="announcement-header">
            <div class="announcement-title-group">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="announcement-icon" style="color: var(--primary);"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <h3 class="announcement-title" style="margin: 0; font-size: 1.1rem; color: var(--text-main);">{{ announcement.title }}</h3>
            </div>
            <button type="button" class="announcement-dismiss" onclick="dismissAnnouncement('{{ announcement.id }}')" aria-label="Dismiss" style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="announcement-content" style="margin-top: 0.75rem; color: var(--text-main); font-size: 0.95rem; line-height: 1.5;">
            {{ announcement.content|linebreaks }}
        </div>
        <div class="announcement-meta" style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">
            <span>By {{ announcement.created_by.username }}</span> &bull; <span>{{ announcement.created_at|date:"M j, Y" }}</span>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const cards = document.querySelectorAll('.announcement-card');
        cards.forEach(card => {
            const id = card.getAttribute('data-announcement-id');
            if (localStorage.getItem('dismissed_announcement_' + id)) {
                card.style.display = 'none';
            }
        });
        
        // Hide container if all children are hidden
        const container = document.querySelector('.announcements-container');
        if (container) {
            const visibleCards = Array.from(cards).filter(c => c.style.display !== 'none');
            if (visibleCards.length === 0) {
                container.style.display = 'none';
            }
        }
    });

    function dismissAnnouncement(id) {
        const card = document.getElementById('announcement-' + id);
        if (card) {
            card.style.transition = 'opacity 0.3s ease, transform 0.3s ease, margin 0.3s ease, padding 0.3s ease, height 0.3s ease';
            card.style.opacity = '0';
            card.style.transform = 'translateY(-10px)';
            card.style.margin = '0';
            card.style.padding = '0';
            card.style.height = '0';
            card.style.overflow = 'hidden';
            setTimeout(() => {
                card.style.display = 'none';
                localStorage.setItem('dismissed_announcement_' + id, 'true');
                
                // Hide container if no visible children left
                const container = document.querySelector('.announcements-container');
                if (container) {
                    const visibleCards = Array.from(document.querySelectorAll('.announcement-card')).filter(c => c.style.display !== 'none');
                    if (visibleCards.length === 0) {
                        container.style.display = 'none';
                    }
                }
            }, 300);
        }
    }
</script>
<style>
    .announcement-card {
        padding: 1.25rem 1.5rem;
        border-left: 4px solid var(--primary);
    }
    .announcement-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .announcement-title-group {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }
    .announcement-dismiss:hover {
        background-color: var(--border);
        color: var(--text-main);
    }
</style>
{% endif %}
